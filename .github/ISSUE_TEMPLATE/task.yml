name: Task
description: Tâche technique
title: "[TASK] "
labels: ["task"]
body:
  - type: textarea
    id: objectif
    attributes:
      label: 🎯 Objectif
    validations:
      required: true

  - type: textarea
    id: resultat
    attributes:
      label: 📦 Notes Technique
    validations:
      required: true

  - type: textarea
    id: dor
    attributes:
      label: 📌 Definition of Ready
      value: |
        - [ ] Objectif technique clair
        - [ ] Périmètre bien défini
        - [ ] Pas de dépendance bloquante
        - [ ] Résultat attendu explicite

  - type: textarea
    id: dod
    attributes:
      label: 🏁 Definition of Done
      value: |
        - [ ] Travail technique terminé
        - [ ] Aucun impact négatif sur l’existant
        - [ ] Documentation mise à jour si nécessaire

  - type: markdown
    attributes:
      value: |
        ⚠️ Avant de créer l’issue :
        Vérifiez que le type sélectionné est bien **Task**