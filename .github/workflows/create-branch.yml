name: Auto Create Branch

on:
  issues:
    types: [assigned]

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine branch type from labels
        id: info
        run: |
          LABELS="${{ join(github.event.issue.labels.*.name, ',') }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          if echo "$LABELS" | grep -qi "hotfix"; then
            BRANCH_TYPE="hotfix"
          elif echo "$LABELS" | grep -qi "bug"; then
            BRANCH_TYPE="fix"
          else
            BRANCH_TYPE="feat"
          fi

          echo "branch_name=${BRANCH_TYPE}/TICKET-${ISSUE_NUMBER}" >> $GITHUB_OUTPUT

      - name: Create branch
        run: |
          BRANCH="${{ steps.info.outputs.branch_name }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
