name: Auto Create Branch
on:
  project_card:
    types: [moved]

jobs:
  create_branch:
    if: github.event.project_card.column_name == 'Ready'
    runs-on: ubuntu-latest
    steps:
      - name: Get Issue Type and Number
        id: info
        run: |
          TYPE=$(echo "${{ github.event.issue.type }}" | tr '[:upper:]' '[:lower:]')
          if [ "$TYPE" == "user story" ] || [ "$TYPE" == "task" ]; then TYPE="feat"; fi
          if [ "$TYPE" == "bugfix" ] || [ "$TYPE" == "hotfix" ]; then TYPE="fix"; fi

          echo "BRANCH_TYPE=$TYPE" >> $GITHUB_ENV
          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

      - name: Create Branch
        uses: peterjgrainger/action-create-branch@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: ${{ env.BRANCH_TYPE }}/TICKET-${{ env.ISSUE_NUMBER }}
